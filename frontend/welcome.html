<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAE — Welcome</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root {
    --bg-base:#0d0d0d;--bg-surface:#131313;--bg-raised:#191919;--bg-hover:#1e1e1e;--bg-active:#242424;
    --border:#1e1e1e;--border-strong:#2a2a2a;
    --text:#e0dcd7;--text-dim:#6e6e6e;--text-muted:#4a4a4a;--text-bright:#f0ece8;
    --accent:#fab283;--accent-hover:#fcd053;
    --accent-green:#12c905;--accent-red:#fc533a;--accent-blue:#8cb0ff;--accent-purple:#edb2f1;
    --shadow-lg:0 8px 32px rgba(0,0,0,0.6);
    --radius-sm:3px;--radius-md:5px;--radius-lg:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Inter',-apple-system,sans-serif;
    background:var(--bg-base);
    color:var(--text);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow-y:auto;
    -webkit-font-smoothing:antialiased;
}
::selection{background:rgba(250,178,131,0.22);color:var(--text-bright)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#242424;border-radius:3px}

.container{max-width:640px;width:100%;padding:40px 24px}

/* Logo */
.logo{text-align:center;margin-bottom:36px}
.logo-icon{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:72px;height:72px;
    border-radius:18px;
    background:linear-gradient(135deg,#fab283 0%,#e8704a 50%,#fc533a 100%);
    font-size:36px;
    margin-bottom:14px;
    box-shadow:0 8px 24px rgba(250,178,131,0.2);
}
.logo h1{
    font-family:'Comic Sans MS',cursive;
    font-size:28px;
    font-weight:700;
    color:var(--text-bright);
    letter-spacing:-0.5px;
}
.logo p{color:var(--text-muted);font-size:12px;margin-top:4px}

/* Quick Actions */
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:32px}
.action-card{
    padding:14px;
    background:var(--bg-raised);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    cursor:pointer;
    transition:all 0.15s;
}
.action-card:hover{border-color:var(--accent);background:var(--bg-hover)}
.action-card .icon{
    width:32px;height:32px;
    border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;
    margin-bottom:8px;
}
.action-card h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.action-card p{font-size:11px;color:var(--text-muted)}

/* Keyboard Shortcuts */
.section-title{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.6px;
    color:var(--text-dim);
    font-weight:600;
    margin-bottom:10px;
}
.shortcuts{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:32px}
.shortcut{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:6px 10px;
    background:var(--bg-raised);
    border-radius:var(--radius-sm);
    font-size:11px;
    color:var(--text);
}
.shortcut kbd{
    background:var(--bg-hover);
    padding:2px 6px;
    border-radius:3px;
    font-size:10px;
    color:var(--text-dim);
    font-family:inherit;
}

/* Recent Files */
.recent-list{background:var(--bg-raised);border-radius:6px;padding:4px;margin-bottom:32px}
.recent-item{
    display:flex;align-items:center;gap:8px;
    padding:6px 10px;
    border-radius:var(--radius-sm);
    cursor:pointer;
    font-size:12px;
    color:var(--text);
    transition:background 0.1s;
}
.recent-item:hover{background:var(--bg-hover)}
.recent-item i{font-size:14px;width:18px;text-align:center;opacity:0.85}
.recent-item .path{color:var(--text-muted);font-size:10px;margin-left:auto}

/* Bottom Links */
.bottom-links{
    text-align:center;
    margin-top:24px;
    padding-top:16px;
    border-top:1px solid var(--border);
    font-size:11px;
    color:var(--text-muted);
}
.bottom-links a{color:var(--accent);text-decoration:none;cursor:pointer}
.bottom-links a:hover{text-decoration:underline}
.bottom-links .sep{margin:0 8px;opacity:0.4}
</style>
</head>
<body>
<div class="container">
    <!-- Logo -->
    <div class="logo">
        <div class="logo-icon">⚡</div>
        <h1>Make Anything Editor</h1>
        <p>Version 1.0 — MAE</p>
    </div>

    <!-- Quick Actions -->
    <div class="actions" id="actions">
        <div class="action-card" onclick="parent.M.fileNew()">
            <div class="icon" style="background:rgba(250,178,131,0.1);color:var(--accent);"><i class="fa-solid fa-file-circle-plus"></i></div>
            <h3>New File</h3>
            <p>Create a new file in workspace</p>
        </div>
        <div class="action-card" onclick="parent.M.UI.showSidebar('skills')">
            <div class="icon" style="background:rgba(140,176,255,0.1);color:var(--accent-blue);"><i class="fa-solid fa-graduation-cap"></i></div>
            <h3>Skills</h3>
            <p>AI coding assistants</p>
        </div>
        <div class="action-card" onclick="parent.M.UI.showSidebar('git')">
            <div class="icon" style="background:rgba(18,201,5,0.1);color:var(--accent-green);"><i class="fa-brands fa-git-alt"></i></div>
            <h3>Source Control</h3>
            <p>Publish to GitHub</p>
        </div>
        <div class="action-card" onclick="parent.M.UI.togglePanel('chat')">
            <div class="icon" style="background:rgba(237,178,241,0.1);color:var(--accent-purple);"><i class="fa-solid fa-comment-dots"></i></div>
            <h3>AI Chat</h3>
            <p>Ask AI for help</p>
        </div>
    </div>

    <!-- Keyboard Shortcuts -->
    <div class="section-title">Keyboard Shortcuts</div>
    <div class="shortcuts">
        <div class="shortcut"><span>New File</span><kbd>Ctrl+N</kbd></div>
        <div class="shortcut"><span>Save</span><kbd>Ctrl+S</kbd></div>
        <div class="shortcut"><span>AI Chat</span><kbd>Ctrl+K</kbd></div>
        <div class="shortcut"><span>Run Code</span><kbd>Ctrl+Enter</kbd></div>
    </div>

    <!-- Recent Files -->
    <div id="recentSection"></div>

    <!-- Bottom Links -->
    <div class="bottom-links">
        <a onclick="parent.window.open('/docs','_blank')">API Docs</a>
        <span class="sep">·</span>
        <a onclick="parent.M.UI.showSettings()">Settings</a>
        <span class="sep">·</span>
        <a onclick="parent.window.open('/studio','_self')">AI Studio</a>
        <span class="sep">·</span>
        <a onclick="parent.window.open('/themes','_blank')">Themes</a>
    </div>
</div>

<script>
function loadRecent() {
    try {
        const recent = JSON.parse(localStorage.getItem('mae-recent') || '[]');
        if (recent.length === 0) return;
        const iconMap = {
            py:'fa-brands fa-python', js:'fa-brands fa-js', ts:'fa-brands fa-js',
            html:'fa-brands fa-html5', css:'fa-brands fa-css3-alt', json:'fa-solid fa-code',
            md:'fa-brands fa-markdown', sh:'fa-solid fa-terminal', sql:'fa-solid fa-database',
            go:'fa-brands fa-golang', rs:'fa-brands fa-rust', rb:'fa-solid fa-gem',
            java:'fa-brands fa-java', dockerfile:'fa-brands fa-docker',
        };
        const items = recent.slice(0, 5).map(r => {
            const ext = (r.name||'').split('.').pop()?.toLowerCase() || '';
            const icon = iconMap[ext] || 'fa-solid fa-file';
            return `<div class="recent-item" onclick="parent.Explorer.openFile('${r.path}','${r.name}')">
                <i class="${icon}" style="color:${icon.startsWith('fa-brands')?'var(--accent-blue)':'var(--accent)'}"></i>
                <span>${r.name}</span>
                <span class="path">${r.path}</span>
            </div>`;
        }).join('');
        document.getElementById('recentSection').innerHTML =
            `<div class="section-title">Recent Files</div><div class="recent-list">${items}</div>`;
    } catch(e) {}
}
loadRecent();
</script>
</body>
</html>
